services:
  postgres:
    image: postgres:16-alpine
    container_name: ev-sim-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ev-sim-db
    ports:
      - "5432:5432"
    volumes:
      - ev_sim_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ev-sim-db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ev_sim_pgdata:
